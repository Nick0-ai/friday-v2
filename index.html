<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Friday is now 20n.</title>
  <meta name="description" content="Friday evolved into 20n — the universal brain for robots.">
  <meta property="og:title" content="Friday is now 20n.">
  <meta property="og:description" content="From pixels to robots.">
  <link rel="icon" type="image/png" href="favicon2.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      -webkit-font-smoothing: antialiased;
    }

    .content {
      max-width: 520px;
    }

    h1 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(40px, 7vw, 64px);
      font-weight: 400;
      font-style: italic;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 24px;
    }

    .sub {
      font-family: 'DM Mono', 'Courier New', monospace;
      font-size: 14px;
      color: #71717a;
      line-height: 1.7;
      margin-bottom: 48px;
    }

    .cta {
      display: inline-block;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #000;
      background: #fff;
      padding: 12px 36px;
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: opacity 0.2s;
    }
    .cta:hover { opacity: 0.85; }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      padding: 20px;
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: #3f3f46;
    }
    footer a { color: #3f3f46; text-decoration: none; }
    footer a:hover { color: #71717a; }

    .fade { opacity: 0; transform: translateY(8px); animation: up 0.5s ease forwards; }
    .d1 { animation-delay: 0.1s; }
    .d2 { animation-delay: 0.25s; }
    .d3 { animation-delay: 0.4s; }
    @keyframes up { to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="content">
  <h1 class="fade">Friday is now 20n.</h1>
  <p class="sub fade d1">Friday proved a brain could control a screen. Same architecture, bigger question. From pixels to robots.</p>
  <a href="https://20n.dev" class="cta fade d2">Discover 20n &rarr;</a>
</div>

<footer class="fade d3">20n Research Laboratory &middot; <a href="https://20n.dev">20n.dev</a></footer>

</body>
</html>
